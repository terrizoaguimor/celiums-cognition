# Celiums Cognition (Hard) — local production stack (HANDOFF §4.1).
# Brought up by `pnpm celiums-cognition setup` (src/setup.ts).
name: celiums-cognition

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: celiums
      POSTGRES_PASSWORD: celiums
      POSTGRES_DB: celiums_memory
    # Bind to loopback only. Docker bypasses iptables INPUT chain, so
    # "5432:5432" would expose Postgres to the public interface even if
    # ufw/firewalld block it. The plugin connects via 127.0.0.1.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - celiums_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U celiums -d celiums_memory"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.0
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - celiums_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8
    command: ["valkey-server", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - celiums_valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  celiums_pg:
  celiums_qdrant:
  celiums_valkey:
