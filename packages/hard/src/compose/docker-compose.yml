# Celiums Cognition (Hard) — local production stack.
# Brought up by `node dist/setup.js` (or, in service.start, by the
# adapter's bootstrap fallback).
#
# Doctrine I6: health gates per layer (each container has a healthcheck;
# `docker compose up --wait` blocks until all are healthy).
# Audit P0 #3 (hardcoded credentials): the Postgres password is taken
# from $POSTGRES_PASSWORD when provided (setup.ts generates a unique
# value into ~/.celiums-cognition/credentials.env and passes --env-file
# to compose). The `:-celiums` fallback is a backward-compat shim for
# operators with pre-existing installs that already have a PG volume
# initialized with the legacy default — those installs SHOULD rotate
# via `ALTER USER celiums WITH PASSWORD '...';` and update credentials.env,
# but this compose still boots them.
#
# Timezone (2026-05-21 circadian fix): containers honour the operator's
# `TZ` env when provided, falling back to `UTC` (Docker default). The
# limbic engine still reads `user_profiles.timezone_offset` from PG for
# its own circadian math, so this `TZ` is only for cosmetic correctness
# of `NOW()` timestamps and log lines inside containers. The bootstrap
# path (setup.ts / service.start) reads `/etc/timezone` from the host
# and forwards it as `TZ` so a fresh install matches the operator's
# locale automatically.
name: celiums-cognition

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-celiums}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-celiums}
      POSTGRES_DB: ${POSTGRES_DB:-celiums_memory}
      TZ: ${TZ:-UTC}
      # Apply timezone at server level too — connections inherit it via
      # `current_setting('TIMEZONE')`. ALTER DATABASE is the persistent
      # form; this `command` ensures it on first init when no volume
      # exists yet.
      PGTZ: ${TZ:-UTC}
    # Bind to loopback only. Docker bypasses iptables INPUT chain, so
    # "5432:5432" would expose Postgres to the public interface even if
    # ufw/firewalld block it. The plugin connects via 127.0.0.1.
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - celiums_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-celiums} -d $${POSTGRES_DB:-celiums_memory}"]
      interval: 5s
      timeout: 5s
      retries: 20

  qdrant:
    image: qdrant/qdrant:v1.14.0
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - celiums_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 20

  valkey:
    image: valkey/valkey:8
    command: ["valkey-server", "--save", "60", "1"]
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - celiums_valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # OpenSearch single-node — backs the ethics knowledge corpus
  # (~1857 docs, 1024-dim embeddings, hybrid BM25 + k-NN search).
  # Layer D of the ethics pipeline consults this index; without it
  # Layer D abstains cleanly and the other four layers (lexicon, CVaR,
  # multi-framework LLM, audit) still run. With it, the engine answers
  # corpus-grounded queries inside the turn-context budget.
  #
  # Security plugin disabled for the local-loopback dev/prod-on-one-host
  # case (the listener binds 127.0.0.1 — exposing it requires an explicit
  # reverse proxy). Operators with multi-host setups should run their
  # own OpenSearch with security on and set OPENSEARCH_URL accordingly.
  #
  # Heap capped at 512 MB → container footprint ~768 MB. Total bundled
  # stack RAM: postgres (~150 MB) + qdrant (~100 MB) + valkey (~50 MB) +
  # opensearch (~768 MB) ≈ 1.1 GB steady state.
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    environment:
      TZ: ${TZ:-UTC}
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      bootstrap.memory_lock: "false"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - celiums_opensearch:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

volumes:
  celiums_pg:
  celiums_qdrant:
  celiums_valkey:
  celiums_opensearch:
