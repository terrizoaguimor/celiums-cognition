# Celiums Cognition monorepo — pnpm workspace
# Dependency graph:
#   hard ──→ shared ──→ engine
# engine + shared are "private": true (never published to npm).
# hard (@celiumsai/cognition) is publishable.
#
# `openclaw` is declared by hard ONLY as an optional peerDependency (the
# host provides it at runtime via ClawHub). autoInstallPeers:false keeps it —
# and its heavy native deps (sharp/koffi/…) — out of this dev tree. The SDK
# type dependency is wired explicitly in Phase 3 (see CLAUDE.md deviation log).
autoInstallPeers: false
packages:
  - "packages/memory-types"
  - "packages/engine"
  - "packages/shared"
  - "packages/hard"
